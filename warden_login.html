<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warden Login | SNJB Anumati</title>
    <meta name="description" content="Warden/Admin login portal for SNJB's Anumati Hostel Leave Management system.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body class="home-bg">
    <header class="header">
        <div class="logo-area">
            <span class="nmims-text">SNJB'S</span>
            <span class="brand-name">ANUMATI Hostel Management</span>
        </div>
    </header>

    <div class="hero-section">
        <div class="auth-card">
            <h2><i class="fas fa-user-shield"
                    style="font-size:1.2rem; margin-right:10px; color:var(--maroon);"></i>Warden Sign In</h2>
            <form id="wardenLoginForm" autocomplete="off">
                <div style="margin-bottom: 18px;">
                    <label for="wEmail">Official Admin Email</label>
                    <input type="email" id="wEmail" class="input-field" placeholder="warden@test.com" required>
                </div>
                <div style="margin-bottom: 22px;">
                    <label for="wPass">Admin Key (Password)</label>
                    <input type="password" id="wPass" class="input-field" placeholder="••••••••" required>
                </div>
                <p id="loginError" class="error-msg"></p>
                <button type="submit" id="loginBtn" class="btn-nmims-submit" style="border:none;">Authorize
                    Login</button>
            </form>
            <a href="index.html" class="auth-back-link">← Back to Role Selection</a>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        document.getElementById('wardenLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('wEmail').value.trim();
            const password = document.getElementById('wPass').value;

            setError('loginError', '');
            setButtonLoading(btn, true, 'Authorize Login');

            try {
                const data = await apiRequest('POST', '/auth/warden/login', { email, password });
                saveUser('warden', data);    // stores user_id, email
                window.location.href = 'warden.html';
            } catch (err) {
                setError('loginError', err.message || 'Access denied. Check your credentials.');
                setButtonLoading(btn, false, 'Authorize Login');
            }
        });
    </script>
</body>

</html>
