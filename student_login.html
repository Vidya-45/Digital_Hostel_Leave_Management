<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | SNJB Anumati</title>
    <meta name="description" content="Student login portal for SNJB's Anumati Hostel Leave Management system.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="home-bg">
    <header class="header">
        <div class="logo-area">
            <span class="nmims-text">SNJB'S</span>
            <span class="brand-name">ANUMATI Hostel Management</span>
        </div>
    </header>

    <div class="hero-section">
        <div class="auth-card">
            <h2><i class="fas fa-user-graduate" style="font-size:1.2rem; margin-right:10px; color:var(--maroon);"></i>Student Sign In</h2>
            <form id="studentLoginForm" autocomplete="off">
                <div style="margin-bottom: 18px;">
                    <label for="sEmail">Registered Email ID</label>
                    <input type="email" id="sEmail" class="input-field" placeholder="student@test.com" required>
                </div>
                <div style="margin-bottom: 22px;">
                    <label for="sPassword">Password</label>
                    <input type="password" id="sPassword" class="input-field" placeholder="••••••••" required>
                </div>
                <p id="loginError" class="error-msg"></p>
                <button type="submit" id="loginBtn" class="btn-nmims-submit" style="border:none;">Sign In</button>
            </form>
            <a href="index.html" class="auth-back-link">← Back to Role Selection</a>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        document.getElementById('studentLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('sEmail').value.trim();
            const password = document.getElementById('sPassword').value;

            setError('loginError', '');
            setButtonLoading(btn, true, 'Sign In');

            try {
                const data = await apiRequest('POST', '/auth/student/login', { email, password });
                saveUser('student', data);   // stores user_id, email
                window.location.href = 'student.html';
            } catch (err) {
                setError('loginError', err.message || 'Invalid email or password.');
                setButtonLoading(btn, false, 'Sign In');
            }
        });
    </script>
</body>
</html>
