<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login | SNJB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo-area"><span class="brand-name">SNJB</span></div>
    </header>
    <div class="hero-section">
        <div class="auth-card card" style="background:white; padding:40px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1); width:350px;">
            <h2 style="color:var(--nmims-red)">Student Sign In</h2>
            <form action="student.html">
                <input type="email" placeholder="Email ID" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd;">
                <input type="password" placeholder="Password" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd;">
               <button type="submit" class="btn-nmims-submit" style="width:100%; border: none;">Login</button>
            </form>
            <a href="index.html" style="display:block; margin-top:15px; font-size:0.8rem; color:#666;">Back to Selection</a>
        </div>
    </div>
</body>
</html>
